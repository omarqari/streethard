name: Refresh Listings

on:
  schedule:
    # Every Sunday at 8:00 AM UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      url:
        description: "StreetEasy search URL (leave blank for default)"
        required: false
        default: ""
      max_items:
        description: "Max listings to fetch (default: 500)"
        required: false
        default: "500"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/ back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run pull script
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          URL="${{ github.event.inputs.url }}"
          MAX="${{ github.event.inputs.max_items }}"
          MAX="${MAX:-500}"

          if [ -n "$URL" ]; then
            python scripts/pull.py --url "$URL" --max-items "$MAX"
          else
            python scripts/pull.py --max-items "$MAX"
          fi
        # If pull.py exits with code 1 (guard clause triggered), this step fails
        # and the workflow stops here — data/latest.json is NOT committed.

      - name: Commit updated data
        run: |
          git config user.name  "StreetHard Bot"
          git config user.email "streethard-bot@users.noreply.github.com"
          git add data/
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to data/ — skipping commit."
          else
            COUNT=$(python -c "import json; d=json.load(open('data/latest.json')); print(d['listing_count'])")
            COST=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d['run_cost_usd'])")
            git commit -m "chore: refresh listings — ${COUNT} listings, \$${COST} [skip ci]"
            git push
          fi
