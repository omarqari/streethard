name: Refresh Listings

on:
  schedule:
    # Monday 9 AM UTC + Thursday 9 AM UTC
    - cron: "0 9 * * 1"
    - cron: "0 9 * * 4"
  workflow_dispatch:
    inputs:
      mode:
        description: "Listing types to pull: both, sale, or rent (default: both)"
        required: false
        default: "both"
      max_items:
        description: "Max listings per type (default: 500)"
        required: false
        default: "500"
      pass1_only:
        description: "Skip Pass 2 detail scraping — use when actor's individual listing pages are broken (true/false)"
        required: false
        default: "false"
      force_pass2:
        description: "Bypass delta cache, run Pass 2 on all listings — use once after Pass 2 was broken to backfill fees/taxes/agent/history (true/false)"
        required: false
        default: "false"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/ back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run pull script
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MAX="${{ github.event.inputs.max_items }}"
          PASS1_ONLY="${{ github.event.inputs.pass1_only }}"
          FORCE_PASS2="${{ github.event.inputs.force_pass2 }}"
          MODE="${MODE:-both}"
          MAX="${MAX:-500}"
          PASS1_ONLY="${PASS1_ONLY:-false}"
          FORCE_PASS2="${FORCE_PASS2:-false}"
          EXTRA_FLAGS=""
          [ "$PASS1_ONLY"  = "true" ] && EXTRA_FLAGS="$EXTRA_FLAGS --pass1-only"
          [ "$FORCE_PASS2" = "true" ] && EXTRA_FLAGS="$EXTRA_FLAGS --force-pass2"
          python scripts/pull.py --mode "$MODE" --max-items "$MAX" $EXTRA_FLAGS
        # If pull.py exits with code 1 (guard clause triggered), this step fails
        # and the workflow stops here — data/latest.json is NOT committed.

      - name: Commit updated data
        run: |
          git config user.name  "StreetHard Bot"
          git config user.email "streethard-bot@users.noreply.github.com"
          git add data/
          # partial.json is written after each completed type. If the workflow
          # fails mid-run (e.g. rental Pass 1 aborts after sale succeeded),
          # this commit step is skipped and partial.json stays local — it won't
          # be committed, but it is available for inspection in the Actions log.
          # On a successful run, pull.py deletes partial.json before this step.
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to data/ — skipping commit."
          else
            COUNT=$(python -c "import json; d=json.load(open('data/latest.json')); print(d['listing_count'])")
            SALE=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d.get('sale_count','?'))")
            RENT=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d.get('rental_count','?'))")
            COST=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d['run_cost_usd'])")
            git commit -m "chore: refresh listings — ${COUNT} listings (${SALE} sale, ${RENT} rent), \$${COST} [skip ci]"
            git push
          fi
