name: Refresh Listings

on:
  schedule:
    # Daily at 9 AM UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Listing types to pull: both, sale, or rent (default: both)"
        required: false
        default: "both"
      max_items:
        description: "Max listings per type (default: 500)"
        required: false
        default: "500"
      pass1_only:
        description: "Skip Pass 2 detail scraping — use when actor's individual listing pages are broken (true/false)"
        required: false
        default: "false"
      force_pass2:
        description: "Bypass delta cache, run Pass 2 on all listings — use once after Pass 2 was broken to backfill fees/taxes/agent/history (true/false)"
        required: false
        default: "false"
      stale_cap:
        description: "Stale-refresh: # of most-stale listings to re-price per run (rotating). 0 disables. Default 60."
        required: false
        default: "60"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/ back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run pull script
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MAX="${{ github.event.inputs.max_items }}"
          PASS1_ONLY="${{ github.event.inputs.pass1_only }}"
          FORCE_PASS2="${{ github.event.inputs.force_pass2 }}"
          MODE="${MODE:-both}"
          MAX="${MAX:-500}"
          PASS1_ONLY="${PASS1_ONLY:-false}"
          FORCE_PASS2="${FORCE_PASS2:-false}"
          EXTRA_FLAGS=""
          [ "$PASS1_ONLY"  = "true" ] && EXTRA_FLAGS="$EXTRA_FLAGS --pass1-only"
          [ "$FORCE_PASS2" = "true" ] && EXTRA_FLAGS="$EXTRA_FLAGS --force-pass2"
          python scripts/pull.py --mode "$MODE" --max-items "$MAX" $EXTRA_FLAGS
        # If pull.py exits with code 1 (guard clause triggered), this step fails
        # and the workflow stops here — data/latest.json is NOT committed.

      - name: Refresh stale listing prices (rotating, capped)
        # Runs ONLY if pull.py succeeded (skip on a guard/cliff abort day).
        # The UES Pass 1 search only surfaces ~207 of ~380 sale listings, so
        # the rest age out of the sample while staying active — sometimes with
        # price cuts. This re-prices the N least-recently-refreshed stale
        # listings each run (oldest last_pass2 first), walking the whole stale
        # set over ~ceil(stale/cap) days. See stale_refresh.py + CHANGELOG S43.
        if: success()
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          CAP="${{ github.event.inputs.stale_cap }}"
          CAP="${CAP:-60}"
          if [ "$CAP" != "0" ]; then
            # Non-fatal: a stale-refresh hiccup must never block the commit of
            # Pass 1/Pass 2 results below. Missed listings just rotate in later.
            python scripts/stale_refresh.py --run --type both --cap "$CAP" \
              || echo "stale refresh non-fatal failure (exit $?) — continuing"
          else
            echo "stale_cap=0 — skipping stale refresh"
          fi

      - name: Commit updated data
        # Run even if pull.py exited non-zero. Pass 1 progress is saved to
        # data/db.json before Pass 2 runs, so a Pass 2 failure should not
        # discard Pass 1 work. The git diff --cached --quiet check below
        # ensures we still no-op when nothing actually changed (e.g. when
        # the new sentinel guard exits 1 BEFORE save_db).
        if: success() || failure()
        run: |
          git config user.name  "StreetHard Bot"
          git config user.email "streethard-bot@users.noreply.github.com"
          git add data/
          # partial.json is written after each completed type. If the workflow
          # fails mid-run (e.g. rental Pass 1 aborts after sale succeeded),
          # this commit step is skipped and partial.json stays local — it won't
          # be committed, but it is available for inspection in the Actions log.
          # On a successful run, pull.py deletes partial.json before this step.
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to data/ — skipping commit."
          else
            COUNT=$(python -c "import json; d=json.load(open('data/latest.json')); print(d.get('listing_count', len(d.get('listings', []))))")
            SALE=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d.get('sale_count','?'))")
            RENT=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d.get('rental_count','?'))")
            COST=$(python  -c "import json; d=json.load(open('data/latest.json')); print(d.get('run_cost_usd','?'))")
            git commit -m "chore: refresh listings — ${COUNT} listings (${SALE} sale, ${RENT} rent), \$${COST} [skip ci]"
            git pull --rebase origin main
            git push
          fi
